<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Malik</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Lato:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: 'Lato', sans-serif;
  }

  .card {
    background: linear-gradient(160deg, #0f3d2e 0%, #1a5c3a 40%, #0d3326 100%);
    border-radius: 20px;
    width: 340px;
    padding: 32px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 30px;
    padding: 7px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #e0f0e8;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #3d8c5e, #1f5c3a);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid rgba(255,255,255,0.15);
    margin: 4px 0;
  }

  .avatar svg {
    width: 54px;
    height: 54px;
    opacity: 0.7;
  }

  .name {
    font-family: 'Oswald', sans-serif;
    font-size: 34px;
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    line-height: 1.1;
  }

  .tagline {
    font-size: 13px;
    color: #a8cbb8;
    text-align: center;
    line-height: 1.6;
  }

  .free-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #f0c040;
    text-transform: uppercase;
  }

  .timer-ring {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #2a6e45;
    background: radial-gradient(circle, #1a4d30, #0f3020);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.4);
  }

  .timer-num {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    color: #ff6b6b;
    line-height: 1;
  }

  .timer-label {
    font-size: 10px;
    color: #7ab090;
    letter-spacing: 2px;
    font-weight: 700;
  }

  .expired {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: #ff6b6b;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #ff4444;
    box-shadow: 0 0 6px #ff4444;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 50px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #e0f0e8;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s;
    margin-top: 4px;
  }

  .btn:hover {
    background: rgba(255,255,255,0.18);
  }
</style>
</head>
<body>
<div class="card">
  <div class="badge">
    🏏 Cricket Updates &amp; Insights
  </div>

  <div class="avatar">
    <svg viewBox="0 0 24 24" fill="#6ab08a" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
    </svg>
  </div>

  <div class="name">Cricket Malik</div>

  <div class="tagline">Honest analysis • Match insights •<br>Community driven</div>

  <div class="free-label">⚡ FREE JOINING ENDS IN</div>

  <div class="timer-ring">
    <div class="timer-num">0</div>
    <div class="timer-label">SEC</div>
  </div>

  <div class="expired">
    <div class="dot"></div>
    Offer Expired!
  </div>

  <button class="btn">Subscribe Free ▶</button>
</div>
</body>
</html>
